name: Multi OS Runner Test

on: push

jobs:

  ubuntu-job:
    runs-on: ubuntu-latest
    steps:
      - name: Print OS info
        run: |
          echo "OS: Ubuntu"
          hostname
          whoami

  windows-job:
    runs-on: windows-latest
    steps:
      - name: Print OS info
        run: |
          echo OS: Windows
          hostname
          whoami

  macos-job:
    runs-on: macos-latest
    steps:
      - name: Print OS info
        run: |
          echo "OS: macOS"
          hostname
          whoami
